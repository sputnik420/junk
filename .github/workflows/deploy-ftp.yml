name: Deploy to HostGator via FTP

on:
  push:
    branches: 
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & FTP Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install PHP for syntax check
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Astro Check
        run: npm run check

      - name: Build Astro Site
        run: npm run build
        env:
          GMAPAPI: ${{ secrets.GMAPAPI }}
          
      - name: Validate Build
        run: npm run validate:build
        
      - name: Validate PHP syntax
        run: php -l public/api/submit.php

      - name: Sync files via FTP to HostGator
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /public_html/
